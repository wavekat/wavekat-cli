name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.0.3). The tag must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: wk
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: unix
          checksum: sha256
          ref: refs/tags/${{ github.event.release.tag_name || inputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

  installer:
    name: Upload install.sh
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - name: Upload install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$tag" install.sh --clobber

  homebrew:
    name: Bump Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    # Skip on workflow_dispatch reruns to avoid pushing stale formulas; only run
    # for real published releases. Also skip prereleases.
    if: github.event_name == 'release' && github.event.release.prerelease == false
    steps:
      - name: Resolve release metadata
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          mkdir shas && cd shas
          for target in aarch64-apple-darwin x86_64-apple-darwin \
                        x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            name="wk-${tag}-${target}.tar.gz.sha256"
            gh release download "$tag" -p "$name" -R "${{ github.repository }}"
            sha="$(awk '{print $1}' "$name")"
            key="$(echo "$target" | tr '-' '_')"
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: wavekat/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Write formula
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/wk.rb <<RUBY
          class Wk < Formula
            desc "Command-line client for the WaveKat platform"
            homepage "https://github.com/wavekat/wavekat-cli"
            version "${{ steps.rel.outputs.version }}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/wavekat/wavekat-cli/releases/download/${{ steps.rel.outputs.tag }}/wk-${{ steps.rel.outputs.tag }}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.rel.outputs.aarch64_apple_darwin }}"
              end
              on_intel do
                url "https://github.com/wavekat/wavekat-cli/releases/download/${{ steps.rel.outputs.tag }}/wk-${{ steps.rel.outputs.tag }}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.rel.outputs.x86_64_apple_darwin }}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/wavekat/wavekat-cli/releases/download/${{ steps.rel.outputs.tag }}/wk-${{ steps.rel.outputs.tag }}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.rel.outputs.aarch64_unknown_linux_musl }}"
              end
              on_intel do
                url "https://github.com/wavekat/wavekat-cli/releases/download/${{ steps.rel.outputs.tag }}/wk-${{ steps.rel.outputs.tag }}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.rel.outputs.x86_64_unknown_linux_musl }}"
              end
            end

            def install
              bin.install "wk"
            end

            test do
              assert_match "wk", shell_output("#{bin}/wk --version")
            end
          end
          RUBY

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/wk.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "wk ${{ steps.rel.outputs.version }}"
          git push
